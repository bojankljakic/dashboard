name: Deploy Dashboard

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Créer le .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: echo "${{ secrets.ENV_FILE }}" > /var/www/dashboard/app/api/.env
      - name: Deploy sur VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/dashboard/app
            git pull origin main

            # API
            cd api
            npm install --production
            # Droits PostgreSQL sur toutes les tables
            sudo -u postgres psql -d dashboard_db -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO dashboard_user; GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO dashboard_user;"
            pm2 restart dashboard-api

            # Front end
            cd ../front
            npm install
            npm run build
            cp -r dist/* /var/www/dashboard/front/

            echo "Deploy terminé ✓"
