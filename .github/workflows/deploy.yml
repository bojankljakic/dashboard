name: Deploy Dashboard

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy sur VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/dashboard/app

            # Récupérer les dernières sources
            git pull origin main

            # API — réinstaller si package.json a changé
            cd api
            npm install --production
            pm2 restart dashboard-api

            # Front — rebuild
            cd ../front
            npm install
            npm run build
            cp -r dist/* /var/www/dashboard/front/

            echo "Deploy terminé ✓"
